<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Wiesbaden WebGIS Demo</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- Loading box -->
    <div id="loading">Loading...</div>

    <!-- Layer controls -->
    <div id="layer-controls" class="map-panel">
      <h2>Layers</h2>
      <label>
        <input type="checkbox" id="toggle-green" checked />
        Green areas
      </label>
      <label>
        <input type="checkbox" id="toggle-buildings" checked />
        Buildings
      </label>
      <label>
        <input type="checkbox" id="toggle-transport" checked />
        Transport
      </label>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Custom JS -->
    <script src="js/map.js"></script>
  </body>
</html>
