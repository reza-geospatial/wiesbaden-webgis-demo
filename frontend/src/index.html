<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Wiesbaden WebGIS Demo</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div id="info-panel" class="map-panel info-panel">
      <div class="info-panel-header">
        <h2>Map Info</h2>
        <button id="info-toggle" type="button" class="info-toggle">-</button>
      </div>

      <div id="info-panel-body" class="info-panel-body">
        <div class="info-section">
          <h3>Status</h3>
          <p>
            <strong>Basemap:</strong>
            <span id="info-basemap">OpenStreetMap</span>
          </p>
          <p><strong>Zoom:</strong> <span id="info-zoom">12</span></p>
          <p>
            <strong>Active layers:</strong>
            <span id="info-layers">Green, Buildings, Transport</span>
          </p>
        </div>
        <div class="info-section">
          <h3>Selection</h3>
          <div id="info-selection">Click a map feature to see details.</div>
        </div>
      </div>
    </div>

    <!-- Loading box -->
    <div id="loading">Loading...</div>

    <!-- Layer controls -->
    <div id="layer-controls" class="map-panel">
      <h2>Layers</h2>
      <label>
        <input type="checkbox" id="toggle-green" checked />
        Green areas
      </label>
      <label>
        <input type="checkbox" id="toggle-buildings" checked />
        Buildings
      </label>
      <label>
        <input type="checkbox" id="toggle-transport" checked />
        Transport
      </label>
    </div>

    <div id="basemap-picker" class="map-panel basemap-picker">
      <button id="basemap-toggle" type="button">Kartentypen</button>

      <div id="basemap-options" class="basemap-options">
        <button
          class="basemap-option is-active"
          data-basemap="osm"
          type="button"
        >
          <span class="basemap-thumb thumb-osm"></span>
          <span class="basemap-label">OSM</span>
        </button>

        <button class="basemap-option" data-basemap="light" type="button">
          <span class="basemap-thumb thumb-light"></span>
          <span class="basemap-label">Light</span>
        </button>

        <button class="basemap-option" data-basemap="dark" type="button">
          <span class="basemap-thumb thumb-dark"></span>
          <span class="basemap-label">Dark</span>
        </button>

        <button class="basemap-option" data-basemap="satellite" type="button">
          <span class="basemap-thumb thumb-satellite"></span>
          <span class="basemap-label">Satellite</span>
        </button>
      </div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <!-- Custom JS -->
    <script src="js/map.js"></script>
  </body>
</html>
